on:
  push:
    branches: [ master ]

jobs:
  deploy_production:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Start PostgreSQL on Ubuntu
        run: |
          sudo systemctl start postgresql.service
          pg_isready

      - name: Create user and DB
        run: |
          sudo -u postgres psql --command="CREATE USER test PASSWORD 'test'" --command="\du"
          sudo -u postgres createdb --owner=test sandwich_test

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.7
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Rubocop
        run: bundle exec rubocop

      - name: Setup DB
        run: |
          cp config/database.yml.example config/database.yml
          RAILS_ENV=test bundle exec rails db:schema:load

      - name: Compile assets
        run: RAILS_ENV=test bundle exec rails assets:precompile

      - name: Run tests
        run: bundle exec rspec

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_PRODUCTION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy with Kamal
        run: bundle exec kamal deploy
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
